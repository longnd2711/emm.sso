<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEM EMM - Đặt lại mật khẩu</title>

    <!-- Thư viện CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Toastify JS -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 15px; }
        .glass-container { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); width: 100%; max-width: 400px; padding: 2.5rem 2rem; color: white; }
        .glass-input { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); color: white; transition: all 0.3s ease; width: 100%; padding: 0.8rem 1rem; border-radius: 1rem; font-size: 0.875rem; }
        .glass-input:focus { background: rgba(255, 255, 255, 0.12); border-color: #f97316; outline: none; box-shadow: 0 0 15px rgba(249, 115, 22, 0.3); }
        .btn-orange { background: linear-gradient(90deg, #f97316 0%, #ea580c 100%); box-shadow: 0 4px 15px rgba(234, 88, 12, 0.4); width: 100%; padding: 1rem; border-radius: 1rem; font-weight: 700; color: white; transition: all 0.3s ease; }
        .btn-orange:disabled { opacity: 0.5; cursor: not-allowed; }
        [v-cloak] { display: none; }
    </style>
</head>
<body>

    <div id="app" v-cloak class="glass-container">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-orange-500 mb-4 shadow-lg shadow-orange-500/30">
                <i data-lucide="key-round" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-white">Thiết lập lại</h1>
            <p class="text-[10px] text-blue-200/60 uppercase tracking-widest mt-1 font-medium">Mật khẩu mới cho tài khoản HEM EMM</p>
        </div>

        <div v-if="isValidSession" class="space-y-5">
            <!-- Ô mật khẩu mới -->
            <div class="relative">
                <label class="text-[10px] text-white/40 uppercase ml-2 mb-1 block">Mật khẩu mới</label>
                <div class="relative">
                    <input :type="showPassword ? 'text' : 'password'" v-model="newPassword" placeholder="Tối thiểu 6 ký tự" class="glass-input pr-12">
                    <button @click="showPassword = !showPassword" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/30 hover:text-orange-400 transition-colors">
                        <i :data-lucide="showPassword ? 'eye-off' : 'eye'" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>

            <!-- Ô xác nhận mật khẩu -->
            <div class="relative">
                <label class="text-[10px] text-white/40 uppercase ml-2 mb-1 block">Xác nhận mật khẩu</label>
                <input :type="showPassword ? 'text' : 'password'" v-model="confirmPassword" placeholder="Nhập lại mật khẩu mới" class="glass-input">
            </div>

            <button @click="handleUpdatePassword" :disabled="loading" class="btn-orange mt-4 uppercase tracking-widest text-xs">
                <span v-if="loading">Đang cập nhật...</span>
                <span v-else>Xác nhận đổi mật khẩu</span>
            </button>
        </div>

        <!-- Thông báo nếu link hết hạn hoặc không hợp lệ -->
        <div v-else class="text-center space-y-4">
            <div class="p-6 bg-red-400/10 rounded-3xl border border-red-400/20">
                <i data-lucide="alert-triangle" class="w-10 h-10 text-red-400 mx-auto mb-3"></i>
                <p class="text-sm text-red-200 leading-relaxed">
                    Liên kết đặt lại mật khẩu không hợp lệ hoặc đã hết hạn. Vui lòng thực hiện lại yêu cầu "Quên mật khẩu".
                </p>
            </div>
            <a href="index.html" class="block text-[10px] text-blue-400 underline uppercase font-bold tracking-widest hover:text-blue-300">Quay về trang đăng nhập</a>
        </div>

        <div class="mt-8 pt-4 border-t border-white/5 text-center">
            <p class="text-[9px] text-blue-200/20">© 2026 HEMEMM. All rights reserved.</p>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted, nextTick, watch } = Vue;

        const SUPABASE_URL = 'https://gjwvhtxkpgwdccizynes.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdqd3ZodHhrcGd3ZGNjaXp5bmVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2MTY3NzYsImV4cCI6MjEwMDE5Mjc3Nn0.J5rE5-LpLdMjipkKk37PQAAJtEDjV5KCqEQAljIp2UE';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function notify(msg, type = 'success') {
            Toastify({
                text: msg, duration: 4000, gravity: "top", position: "right",
                style: { background: type === 'success' ? "linear-gradient(to right, #10b981, #059669)" : "linear-gradient(to right, #ef4444, #dc2626)" }
            }).showToast();
        }

        createApp({
            setup() {
                const newPassword = ref('');
                const confirmPassword = ref('');
                const showPassword = ref(false);
                const loading = ref(false);
                const isValidSession = ref(false);

                function refreshIcons() {
                    nextTick(() => {
                        if (window.lucide) lucide.createIcons();
                    });
                }

                onMounted(async () => {
                    // Kiểm tra xem có token trong URL hash không (Supabase tự động gán khi click link mail)
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    
                    if (session) {
                        isValidSession.value = true;
                    } else {
                        // Nếu không thấy session, có thể link đã cũ hoặc sai
                        isValidSession.value = false;
                    }
                    refreshIcons();
                });

                async function handleUpdatePassword() {
                    if (newPassword.value.length < 6) return notify("Mật khẩu phải từ 6 ký tự", "error");
                    if (newPassword.value !== confirmPassword.value) return notify("Mật khẩu xác nhận không khớp", "error");

                    loading.value = true;
                    const { error } = await supabaseClient.auth.updateUser({
                        password: newPassword.value
                    });

                    if (error) {
                        notify("Lỗi: " + error.message, "error");
                        loading.value = false;
                    } else {
                        notify("✅ Cập nhật mật khẩu thành công! Bạn sẽ được chuyển về trang chủ...");
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 2500);
                    }
                }

                // Theo dõi showPassword để cập nhật icon lucide
                watch(showPassword, () => refreshIcons());

                return { 
                    newPassword, 
                    confirmPassword, 
                    showPassword, 
                    loading, 
                    isValidSession, 
                    handleUpdatePassword 
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
